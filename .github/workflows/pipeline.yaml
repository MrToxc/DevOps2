name: Weather report
on:
  schedule:
    cron: "55 * * * *"
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  weather:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        city: ["Mumbai", "Bejing", "London", "Prague"]
    steps:
      - name: Fetch weather
        run: |
          CITY="${{ matrix.city }}"
          # Using curl to fetch the weather in a format suitable for the console
          WEATHER=$(curl -s "wttr.in/$CITY?format=3")
          echo "Current weather in $CITY: $WEATHER"

          echo "## $CITY Weather" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "weather in $CITY: $WEATHER" > weather.txt